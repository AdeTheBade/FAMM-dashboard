name: Weekly ASM Detection

on:
  schedule:
    - cron: "0 20 * * 6"    # 8 PM UTC = 9 PM WAT, every Saturday
  workflow_dispatch:
    inputs:
      skip_export:
        description: 'Skip EE export — re-download from Drive (files already exported)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write             # needed to push the updated GeoJSON back
  id-token: write             # needed for Workload Identity Federation

jobs:
  detect-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 360      # EE export (several hours for all Ghana regions) + inference + buffer

    steps:

      # ── 1. Checkout dashboard repo ─────────────────────────────────────────
      - name: Checkout dashboard repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      # ── 2. Checkout org ML repo (model weights + boundary files) ───────────
      - name: Checkout FAMM org repo
        uses: actions/checkout@v4
        with:
          repository: projects-hamoye-org/FAMM
          token: ${{ secrets.GH_PAT }}
          path: famm-model

      # ── 3. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 4. Cache pip ───────────────────────────────────────────────────────
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-famm-v2

      # ── 5. Install dependencies ────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install \
            earthengine-api==1.6.12 \
            google-auth==2.41.1 \
            google-auth-httplib2==0.2.0 \
            google-api-python-client==2.184.0 \
            rasterio==1.4.3 \
            geopandas==1.1.2 \
            torch==2.1.0 \
            torchvision==0.16.0 \
            tqdm==4.67.1 \
            shapely==2.1.2 \
            numpy==1.26.3

      # ── 6. Authenticate to Google Cloud via WIF ────────────────────────────
      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # ── 7. Set up Cloud SDK ────────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── 8. Stage model artifacts from org repo ─────────────────────────────
      - name: Stage model artifacts
        run: |
          mkdir -p deployment models data/tif_input data/geojson

          cp famm-model/deployment/geoBoundaries-GHA-ADM1.geojson deployment/
          cp famm-model/deployment/geoBoundaries-GHA-ADM2.geojson deployment/
          cp famm-model/models/mobilenetv3_best.pth               models/

          echo "✅ Model artifacts staged"
          ls -lh models/ deployment/

      # ── 9. Diagnose Python environment ────────────────────────────────────
      - name: Diagnose Python environment
        run: |
          echo "=== Python packages ==="
          pip show earthengine-api google-auth google-api-python-client 2>&1 | grep -E "^(Name|Version|---)";
          echo "=== GOOGLE_APPLICATION_CREDENTIALS ==="
          echo $GOOGLE_APPLICATION_CREDENTIALS

      # ── 10. Export composite from Earth Engine → Drive ─────────────────────
      #        Skipped when skip_export=true (tiles already in Drive from prev run)
      - name: Export Sentinel-2 composite (EE → Drive)
        if: ${{ github.event.inputs.skip_export != 'true' }}
        env:
          EE_USER_CREDENTIALS: ${{ secrets.EE_USER_CREDENTIALS }}
        run: |
          python ee_export_drive_wif.py
          echo "✅ Export complete"

      # ── 11. Re-download tiles from Drive (skip_export mode only) ──────────
      #        Runs only when skip_export=true — pulls today's tiles from Drive
      #        without re-running the full EE export
      - name: Re-download tiles from Drive
        if: ${{ github.event.inputs.skip_export == 'true' }}
        env:
          EE_USER_CREDENTIALS: ${{ secrets.EE_USER_CREDENTIALS }}
        run: |
          python - << 'EOF'
          import os, sys, datetime
          sys.path.insert(0, '.')
          from ee_export_drive_wif import (
              load_creds, initialize_ee,
              build_drive_service, download_region_tiles
          )

          today = datetime.date.today()
          print(f"Re-downloading tiles for: {today}")

          creds_data = load_creds()
          initialize_ee(creds_data)
          drive_svc  = build_drive_service(creds_data)

          regions = [
              "Ashanti", "Brong Ahafo", "Central", "Eastern",
              "Greater Accra", "Northern", "Upper East",
              "Upper West", "Volta", "Western"
          ]

          os.makedirs("data/tif_input", exist_ok=True)
          for region in regions:
              export_name = f"Ghana_{region}_Composite_{today}"
              print(f"\n📂 {region}")
              download_region_tiles(drive_svc, export_name, "data/tif_input")

          count = len([f for f in os.listdir("data/tif_input") if f.endswith(".tif")])
          print(f"\n✅ {count} tile(s) ready in data/tif_input/")
          EOF

      # ── 12. Verify .tif downloaded ─────────────────────────────────────────
      - name: Verify .tif downloaded
        run: |
          COUNT=$(ls data/tif_input/Ghana_*_Composite_*.tif 2>/dev/null | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "❌ No .tif files found in data/tif_input/"
            ls -la data/tif_input/ || echo "Directory is empty or missing"
            exit 1
          fi
          echo "✅ Found $COUNT .tif tile(s):"
          ls -lh data/tif_input/Ghana_*_Composite_*.tif

      # ── 13. Run MobileNet V3 inference ─────────────────────────────────────
      - name: Run inference
        run: python run_inference.py

      # ── 14. Validate and clean GeoJSON ─────────────────────────────────────
      - name: Validate and clean GeoJSON
        run: |
          python validate_rosemary_geojson.py \
            asm_monitoring_results.geojson \
            data/geojson/latest_detections.geojson

      # ── 15. Commit updated detections ──────────────────────────────────────
      - name: Commit updated detections
        run: |
          git config user.name  "FAMM Bot 🤖"
          git config user.email "famm-bot@users.noreply.github.com"

          git add data/geojson/latest_detections.geojson

          if git diff --staged --quiet; then
            echo "ℹ️  No changes in detections — nothing to commit this week."
          else
            COUNT=$(python -c "
          import json
          with open('data/geojson/latest_detections.geojson') as f:
              print(len(json.load(f).get('features', [])))
          ")
            git commit -m "chore: weekly detection update $(date -u '+%Y-%m-%d') — ${COUNT} sites detected"
            git push
            echo "✅ Pushed — Streamlit Cloud will auto-redeploy"
          fi

      # ── 16. Cleanup temporary files ────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          rm -rf data/tif_input/
          rm -f  asm_monitoring_results.geojson
          echo "🧹 Temp files cleaned"
